name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"

      - name: Build Windows app
        run: pyinstaller Demolytics.spec

      - name: Zip app folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/Demolytics" -DestinationPath "Demolytics-${{ github.ref_name }}-Windows.zip" -Force

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: Demolytics-${{ github.ref_name }}-Windows.zip
          generate_release_notes: true
